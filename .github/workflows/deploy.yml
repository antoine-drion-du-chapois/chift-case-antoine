name: Deploy to Local VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted   # ← runs directly on your local VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy app
        run: |
          cd /home/antoi/chift-case-antoine
          git pull
          docker compose down
          docker compose up -d --build
